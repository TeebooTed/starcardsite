<body class="bg-[#0A0A0A] text-zinc-100">

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-amber-400/30">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-4xl">★</span>
        <div class="logo-font text-3xl font-semibold tracking-tighter neon-amber">STAR</div>

  <!-- AUTH MODAL (identical across all pages) -->
  <div id="auth-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[200]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-md mx-4 p-8">
      <h3 id="modal-title" class="text-2xl font-semibold mb-6">Sign In</h3>
      <input id="email" type="email" placeholder="Email" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-4">
      <input id="password" type="password" placeholder="Password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-6">
      <button onclick="handleAuth()" id="auth-submit" class="w-full bg-amber-400 text-black py-4 rounded-2xl font-semibold">Sign In</button>
      <div class="text-center mt-6 text-sm text-zinc-400">
        Don't have an account? 
        <span onclick="toggleAuthMode()" id="switch-mode" class="text-amber-400 cursor-pointer hover:underline">Sign Up</span>
      </div>
      <button onclick="hideAuthModal()" class="absolute top-4 right-4 text-2xl text-zinc-400">✕</button>
    </div>
  </div>

  <script>
    // === YOUR SUPABASE KEYS (replace these) ===
    const SUPABASE_URL = 'https://hjchnjdcoxpcnnerhnop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqY2huamRjb3hwY25uZXJobm9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODEwMTEsImV4cCI6MjA5MDE1NzAxMX0.hBLwlJRYDGYHtCWRZZIAGnctoZcdKNYLOoDydez-NzU';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let collection = [];

    // Auth functions (identical on all pages)
    async function handleAuth() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const isLogin = document.getElementById('modal-title').textContent === 'Sign In';

      let result;
      if (isLogin) result = await supabase.auth.signInWithPassword({ email, password });
      else result = await supabase.auth.signUp({ email, password });

      if (result.error) alert(result.error.message);
      else {
        hideAuthModal();
        currentUser = result.data.user;
        updateAuthUI();
        loadUserCollection();
      }
    }

    function toggleAuthMode() {
      const title = document.getElementById('modal-title');
      const btn = document.getElementById('auth-submit');
      const switchText = document.getElementById('switch-mode');
      if (title.textContent === 'Sign In') {
        title.textContent = 'Sign Up'; btn.textContent = 'Create Account'; switchText.textContent = 'Sign In';
      } else {
        title.textContent = 'Sign In'; btn.textContent = 'Sign In'; switchText.textContent = 'Sign Up';
      }
    }

    function showAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
    function hideAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }

    function updateAuthUI() {
      const btn = document.getElementById('auth-button');
      if (currentUser) {
        btn.innerHTML = `<i class="fas fa-user"></i> ${currentUser.email.split('@')[0]} <span onclick="logout(event)" class="ml-3 text-xs text-red-400">(logout)</span>`;
      } else {
        btn.innerHTML = `<i class="fas fa-user"></i> Sign In`;
      }
    }

    async function logout(e) {
      e.stopImmediatePropagation();
      await supabase.auth.signOut();
      currentUser = null;
      collection = [];
      updateAuthUI();
      updateCount();
    }

    // Collection functions (Supabase + local fallback)
    async function loadUserCollection() {
      if (!currentUser) return;
      const { data } = await supabase.from('user_collections').select('card_id').eq('user_id', currentUser.id);
      collection = data.map(row => ({ id: row.card_id }));
      updateCount();
    }

    async function addToCollection(e, card) {
      e.stopImmediatePropagation();
      if (!currentUser) {
        alert("Sign in to sync your collection across devices");
        showAuthModal();
        return;
      }
      await supabase.from('user_collections').insert({ user_id: currentUser.id, card_id: card.id });
      collection.push(card);
      updateCount();
      alert(`✅ Saved ${card.name} (${card.year})`);
    }

    function updateCount() { document.getElementById('collection-count').textContent = collection.length; }

    // Collection drawer (same as before)
    function toggleCollectionDrawer() { /* same drawer code as previous versions */ }
    function renderCollection() { /* same drawer rendering code */ }
    function removeFromCollection(id) { /* same remove code */ }

    // Initialize
    window.onload = () => {
      supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) {
          currentUser = session.user;
          updateAuthUI();
          loadUserCollection();
        }
      });
    };
  </script>
</body>
</html>
